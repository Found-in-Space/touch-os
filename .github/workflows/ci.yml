name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} / three ${{ matrix.three }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
          - 24
        three:
          - 0.170.0
          - 0.180.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pin matrix Three.js version
        run: npm install --no-save --package-lock=false three@${{ matrix.three }} @types/three@${{ matrix.three }}

      - name: Verify types
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build
