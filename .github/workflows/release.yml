name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Git tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine npm dist-tag
        id: dist_tag
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.version.outputs.package_version }}"

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            PRERELEASE="${PACKAGE_VERSION#*-}"
            DIST_TAG="${PRERELEASE%%.*}"
          else
            DIST_TAG="latest"
          fi

          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $PACKAGE_VERSION with npm dist-tag '$DIST_TAG'."

      - name: Verify types
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish --access public --tag "${{ steps.dist_tag.outputs.dist_tag }}"
